<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-512.png">
    <title>🌟 Glory Tetris</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        body {
            margin: 0;
            background-color: #020617;
            color: white;
            font-family: 'Outfit', sans-serif;
            touch-action: none;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            padding-top: env(safe-area-inset-top);
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            width: 100%;
            height: 100%;
        }

        #game-container {
            position: relative;
            margin-top: 5px;
            border: 4px solid #334155;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(34, 211, 238, 0.2);
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(10px);
            /* Altura aumentada un 10% adicional (80.5vh -> ~88.5vh) */
            max-height: 88.5vh; 
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        canvas#tetris {
            display: block;
            background-color: transparent;
            border-radius: 16px;
            /* Ajuste proporcional del canvas interno (69vh -> 76vh) */
            max-height: 76vh;
            width: auto;
        }

        .header-title {
            font-size: 0.45rem;
            font-weight: 900;
            color: #f8fafc;
            margin-top: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(34, 211, 238, 0.5);
            opacity: 0.8;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .msg-box {
            background: rgba(15, 23, 42, 0.95);
            padding: 30px 20px;
            border-radius: 30px;
            border: 2px solid #22d3ee;
            text-align: center;
            pointer-events: auto;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 60px rgba(34, 211, 238, 0.3);
            width: 90%;
            max-width: 320px;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .btn {
            background: linear-gradient(135deg, #06b6d4 0%, #3b82f6 100%);
            color: white;
            padding: 14px 40px;
            border-radius: 99px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 20px;
            border: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
            transition: all 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(59, 130, 246, 0.4);
        }

        .stats-box {
            background: rgba(30, 41, 59, 0.6);
            padding: 5px 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            text-align: center;
            padding: 8px;
            font-size: 9px;
            color: #64748b;
            letter-spacing: 1px;
            text-transform: uppercase;
            z-index: 50;
        }

        .floating-blocks {
            font-size: 40px;
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            gap: 10px;
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <h1 class="header-title">Glory</h1>

    <div class="flex gap-4 mb-1 mt-1">
        <div class="text-center stats-box">
            <p class="text-[8px] text-cyan-400 uppercase font-black tracking-widest">Puntos</p>
            <p id="score" class="text-lg font-bold text-white leading-tight">0</p>
        </div>
        <div class="text-center stats-box">
            <p class="text-[8px] text-pink-400 uppercase font-black tracking-widest">Nivel</p>
            <p id="level" class="text-lg font-bold text-white leading-tight">1</p>
        </div>
    </div>

    <div id="game-container">
        <canvas id="tetris"></canvas>
        <div id="ui-layer">
            <div id="start-msg" class="msg-box">
                <div class="floating-blocks">
                    <span class="animate-bounce">🟦</span>
                    <span class="animate-bounce" style="animation-delay: 0.1s">🟨</span>
                    <span class="animate-bounce" style="animation-delay: 0.2s">🟥</span>
                </div>
                <h2 class="text-3xl font-black mb-1 bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent uppercase tracking-tighter">¡Hola!</h2>
                <p class="text-slate-400 text-xs mb-4">¿Listo para un desafío brillante?</p>
                <div class="space-y-1 text-slate-300 text-[11px] bg-slate-800/50 p-3 rounded-xl mb-4 text-left">
                    <p>📱 Gira: <b>Toque</b> / Mueve: <b>Swipe</b></p>
                    <p>💻 Usa las <b>Flechas</b> del teclado</p>
                </div>
                <button class="btn" onclick="initAudioAndStart()">¡Empezar!</button>
            </div>

            <div id="game-over-msg" class="msg-box hidden">
                <h2 class="text-3xl font-black mb-1 text-red-500 italic">¡BUEN INTENTO!</h2>
                <p id="final-score" class="text-white text-2xl font-bold mb-4">0 Puntos</p>
                <button class="btn" onclick="resetGame()">Intentar de nuevo</button>
            </div>
        </div>
    </div>

    <footer>
        desarrollado por tecnotic ©
    </footer>

    <script>
        // --- FONDO DE PARTÍCULAS ---
        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        let particles = [];

        function resizeBg() {
            bgCanvas.width = window.innerWidth;
            bgCanvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeBg);
        resizeBg();

        class Particle {
            constructor() {
                this.x = Math.random() * bgCanvas.width;
                this.y = Math.random() * bgCanvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
                this.color = `rgba(${Math.random() * 100 + 50}, ${Math.random() * 150 + 100}, 255, ${Math.random() * 0.3})`;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > bgCanvas.width) this.x = 0;
                if (this.x < 0) this.x = bgCanvas.width;
                if (this.y > bgCanvas.height) this.y = 0;
                if (this.y < 0) this.y = bgCanvas.height;
            }
            draw() {
                bgCtx.fillStyle = this.color;
                bgCtx.beginPath();
                bgCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                bgCtx.fill();
            }
        }

        for (let i = 0; i < 40; i++) particles.push(new Particle());

        function animateBg() {
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateBg);
        }
        animateBg();

        // --- SISTEMA DE AUDIO ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, duration, volume = 0.05) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const sounds = {
            move: () => playTone(180, 'sine', 0.1),
            rotate: () => playTone(350, 'sine', 0.15),
            drop: () => playTone(120, 'triangle', 0.1),
            line: () => {
                playTone(523.25, 'square', 0.3);
                setTimeout(() => playTone(659.25, 'square', 0.3), 100);
            },
            gameOver: () => playTone(100, 'sawtooth', 0.8)
        };

        function initAudioAndStart() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            resetGame();
        }

        // --- MOTOR DEL JUEGO ---
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const levelElement = document.getElementById('level');

        const COLS = 12;
        const ROWS = 16;
        const BLOCK_SIZE = 25; 

        canvas.width = COLS * BLOCK_SIZE;
        canvas.height = ROWS * BLOCK_SIZE;
        context.scale(BLOCK_SIZE, BLOCK_SIZE);

        function createPiece(type) {
            if (type === 'I') return [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]];
            if (type === 'L') return [[0, 2, 0], [0, 2, 0], [0, 2, 2]];
            if (type === 'J') return [[0, 3, 0], [0, 3, 0], [3, 3, 0]];
            if (type === 'O') return [[4, 4], [4, 4]];
            if (type === 'Z') return [[5, 5, 0], [0, 5, 5], [0, 0, 0]];
            if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
            if (type === 'T') return [[0, 7, 0], [7, 7, 7], [0, 0, 0]];
        }

        const colors = [null, '#22d3ee', '#fb923c', '#818cf8', '#facc15', '#f87171', '#4ade80', '#c084fc'];

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) matrix.push(new Array(w).fill(0));
            return matrix;
        }

        function drawMatrix(matrix, offset) {
            if (!matrix) return;
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = colors[value];
                        context.fillRect(x + offset.x + 0.05, y + offset.y + 0.05, 0.9, 0.9);
                        context.fillStyle = 'rgba(255,255,255,0.2)';
                        context.fillRect(x + offset.x + 0.1, y + offset.y + 0.1, 0.3, 0.1);
                    }
                });
            });
        }

        function draw() {
            context.clearRect(0, 0, canvas.width, canvas.height);
            context.strokeStyle = 'rgba(255,255,255,0.03)';
            context.lineWidth = 0.02;
            for(let i=0; i<=COLS; i++) {
                context.beginPath(); context.moveTo(i, 0); context.lineTo(i, ROWS); context.stroke();
            }
            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
                });
            });
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            dir > 0 ? matrix.forEach(row => row.reverse()) : matrix.reverse();
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function arenaSweep() {
            let linesCleared = 0;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                linesCleared++;
            }
            if (linesCleared > 0) {
                player.score += (linesCleared * 10) * linesCleared;
                sounds.line();
                updateScore();
            }
        }

        function playerDrop() {
            if (!player.matrix) return;
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                sounds.drop();
                playerReset();
                arenaSweep();
                updateScore();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            if (!player.matrix) return;
            player.pos.x += dir;
            if (collide(arena, player)) player.pos.x -= dir; else sounds.move();
        }

        function playerRotate(dir) {
            if (!player.matrix) return;
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
            sounds.rotate();
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            if (collide(arena, player)) gameOver();
        }

        function updateScore() {
            scoreElement.innerText = player.score;
            const lvl = Math.floor(player.score / 200) + 1;
            levelElement.innerText = lvl;
            dropInterval = Math.max(100, 850 - (lvl - 1) * 120);
        }

        function gameOver() {
            isGameOver = true;
            sounds.gameOver();
            document.getElementById('final-score').innerText = `${player.score} Puntos`;
            document.getElementById('game-over-msg').classList.remove('hidden');
        }

        function resetGame() {
            arena.forEach(row => row.fill(0));
            player.score = 0;
            isGameOver = false;
            document.getElementById('start-msg').classList.add('hidden');
            document.getElementById('game-over-msg').classList.add('hidden');
            playerReset();
            updateScore();
            update();
        }

        let dropCounter = 0;
        let dropInterval = 850;
        let lastTime = 0;
        let isGameOver = true;

        function update(time = 0) {
            if (isGameOver) return;
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) playerDrop();
            draw();
            requestAnimationFrame(update);
        }

        const arena = createMatrix(COLS, ROWS);
        const player = { pos: {x: 0, y: 0}, matrix: null, score: 0 };

        document.addEventListener('keydown', e => {
            if (isGameOver) return;
            if (e.keyCode === 37) playerMove(-1);
            if (e.keyCode === 39) playerMove(1);
            if (e.keyCode === 40) playerDrop();
            if (e.keyCode === 38) playerRotate(1);
        });

        let touchStartX = 0, touchStartY = 0;
        canvas.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        canvas.addEventListener('touchend', e => {
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(dx) < 10 && Math.abs(dy) < 10) playerRotate(1);
        });

        canvas.addEventListener('touchmove', e => {
            if (isGameOver) return;
            e.preventDefault();
            const dx = e.touches[0].clientX - touchStartX;
            const dy = e.touches[0].clientY - touchStartY;
            if (Math.abs(dx) > 25) { playerMove(dx > 0 ? 1 : -1); touchStartX = e.touches[0].clientX; }
            if (dy > 35) { playerDrop(); touchStartY = e.touches[0].clientY; }
        }, {passive: false});

        draw();
    </script>
</body>
</html>
