<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>👑 Glory Tetris Pro</title>
<link rel="manifest" href="manifest.json">
     <link rel="apple-touch-icon" href="icon-512.png">
    <meta name="theme-color" content="#020617">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap');
        
        body {
            margin: 0; 
            background-color: #020617; 
            color: white;
            font-family: 'Outfit', sans-serif; 
            touch-action: none;
            overflow: hidden; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            height: 100vh; 
            justify-content: space-between;
        }

        #game-container {
            position: relative; 
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 20px; 
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        #game-bg-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: 900;
            font-size: 4rem;
            color: rgba(255, 255, 255, 0.03);
            letter-spacing: 0.5rem;
            pointer-events: none;
            z-index: 0;
            text-transform: uppercase;
        }

        canvas { 
            display: block; 
            max-height: 50vh; 
            width: auto;
            border-radius: 18px;
            position: relative;
            z-index: 1;
        }

        .ctrl-btn {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 18px;
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 24px; 
            transition: all 0.1s;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .ctrl-btn:active {
            background: #ca8a04;
            transform: scale(0.92);
        }

        .score-box {
            background: rgba(30, 41, 59, 0.5);
            padding: 5px 15px;
            border-radius: 12px;
            min-width: 90px;
        }

        #ui-overlay {
            background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(8px);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Cabecera Sutil -->
    <div class="mt-4 opacity-20 tracking-[0.3em] text-[10px] font-bold uppercase">
        Glory
    </div>

    <!-- Estadísticas Superiores -->
    <div class="w-full max-w-[320px] flex justify-between px-4 mt-2">
        <div class="score-box text-center">
            <p class="text-[10px] uppercase text-slate-500 font-bold tracking-widest">Puntos</p>
            <p id="score" class="text-xl font-black text-white">0</p>
        </div>
        <div class="score-box text-center border border-yellow-500/30">
            <p class="text-[10px] uppercase text-yellow-500 font-bold tracking-widest">Récord</p>
            <p id="highscore" class="text-xl font-black text-yellow-500">0</p>
        </div>
    </div>

    <!-- Contenedor del Juego -->
    <div id="game-container" class="mt-2">
        <div id="game-bg-text">TETRIS</div>
        
        <canvas id="tetris"></canvas>
        
        <!-- Pantalla de Inicio / Pausa / Game Over -->
        <div id="ui-overlay" class="absolute inset-0 flex flex-col items-center justify-center rounded-lg z-20">
            <h2 id="ui-title" class="text-4xl font-black text-white mb-2 tracking-tighter italic">TETRIS</h2>
            <p id="ui-subtitle" class="text-slate-400 text-xs mb-6 uppercase tracking-widest">Master Edition</p>
            <button id="main-btn" class="bg-yellow-500 text-slate-950 px-10 py-4 rounded-full font-black text-xl shadow-lg shadow-yellow-500/20 active:scale-95 transition-all" onclick="startGame()">
                JUGAR
            </button>
        </div>
    </div>

    <!-- Controles Táctiles (D-Pad) -->
    <div class="w-full max-w-[400px] grid grid-cols-3 gap-3 p-6 pb-2">
        <div></div>
        <div class="flex gap-2">
            <button class="ctrl-btn h-16 w-full" onmousedown="playerRotate(1)" ontouchstart="handleTouch(event, () => playerRotate(1))">🔄</button>
            <button class="ctrl-btn h-16 w-full" onmousedown="togglePause()" ontouchstart="handleTouch(event, () => togglePause())">⏸️</button>
        </div>
        <div></div>
        
        <button class="ctrl-btn h-16" onmousedown="playerMove(-1)" ontouchstart="handleTouch(event, () => playerMove(-1))">⬅️</button>
        <button class="ctrl-btn h-16 bg-slate-800" onmousedown="playerDrop()" ontouchstart="handleTouch(event, () => playerDrop())">⬇️</button>
        <button class="ctrl-btn h-16" onmousedown="playerMove(1)" ontouchstart="handleTouch(event, () => playerMove(1))">➡️</button>
    </div>

    <!-- Pie de página -->
    <div class="mb-4 opacity-20 tracking-[0.3em] text-[10px] font-bold uppercase">
        © Tecnotic
    </div>

    <script>
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highscoreElement = document.getElementById('highscore');

        const COLS = 10, ROWS = 20, SIZE = 25;
        canvas.width = COLS * SIZE; 
        canvas.height = ROWS * SIZE;
        context.scale(SIZE, SIZE);

        let arena = Array.from({length: ROWS}, () => Array(COLS).fill(0));
        let player = { pos: {x: 0, y: 0}, matrix: null, score: 0 };
        let dropCounter = 0;
        let dropInterval = 1000;
        let lastTime = 0;
        let gameActive = false;
        let isPaused = false;

        let highscore = localStorage.getItem('glory_tetris_highscore') || 0;
        highscoreElement.innerText = highscore;

        function updateHighScore() {
            if (player.score > highscore) {
                highscore = player.score;
                localStorage.setItem('glory_tetris_highscore', highscore);
                highscoreElement.innerText = highscore;
            }
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(freq, type = 'square', duration = 0.1) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function vibrate(pattern) {
            if (navigator.vibrate) navigator.vibrate(pattern);
        }

        function handleTouch(e, callback) {
            e.preventDefault();
            callback();
        }

        function createPiece(type) {
            if (type === 'T') return [[0,1,0],[1,1,1],[0,0,0]];
            if (type === 'O') return [[2,2],[2,2]];
            if (type === 'L') return [[0,0,3],[3,3,3],[0,0,0]];
            if (type === 'J') return [[4,0,0],[4,4,4],[0,0,0]];
            if (type === 'I') return [[0,5,0,0],[0,5,0,0],[0,5,0,0],[0,5,0,0]];
            if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
            if (type === 'Z') return [[7,7,0],[0,7,7],[0,0,0]];
        }

        function draw() {
            context.clearRect(0, 0, COLS, ROWS);
            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }

        function drawMatrix(matrix, offset) {
            const colors = [null, '#22d3ee', '#facc15', '#f87171', '#fb923c', '#4ade80', '#a78bfa', '#f472b6'];
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                        context.lineWidth = 0.05;
                        context.strokeStyle = 'rgba(255,255,255,0.5)';
                        context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        arena[y + player.pos.y][x + player.pos.x] = value;
                    }
                });
            });
            playSound(150, 'sine', 0.1);
            vibrate(20);
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) {
                        return true;
                    }
                }
            }
            return false;
        }

        function arenaSweep() {
            let rowCount = 1;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                player.score += rowCount * 10;
                rowCount *= 2;
                playSound(440 + (rowCount * 100), 'triangle', 0.2);
                vibrate([40, 30, 40]);
            }
            scoreElement.innerText = player.score;
            updateHighScore();
        }

        function playerDrop() {
            if (isPaused || !gameActive) return;
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                resetPlayer();
                arenaSweep();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            if (isPaused || !gameActive) return;
            player.pos.x += dir;
            if (collide(arena, player)) {
                player.pos.x -= dir;
            } else {
                playSound(300, 'sine', 0.05);
                vibrate(10);
            }
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            if (dir > 0) matrix.forEach(row => row.reverse());
            else matrix.reverse();
        }

        function playerRotate(dir) {
            if (isPaused || !gameActive) return;
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
            playSound(500, 'sine', 0.05);
            vibrate(15);
        }

        function resetPlayer() {
            const pieces = 'ILJOTSZ';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            
            if (collide(arena, player)) {
                gameOver();
            }
        }

        function gameOver() {
            gameActive = false;
            document.getElementById('ui-title').innerText = "FIN DEL JUEGO";
            document.getElementById('main-btn').innerText = "REINTENTAR";
            document.getElementById('ui-overlay').classList.remove('hidden');
            vibrate([100, 50, 100, 50, 300]);
        }

        function togglePause() {
            if (!gameActive) return;
            isPaused = !isPaused;
            const overlay = document.getElementById('ui-overlay');
            const title = document.getElementById('ui-title');
            const btn = document.getElementById('main-btn');

            if (isPaused) {
                title.innerText = "PAUSA";
                btn.innerText = "CONTINUAR";
                overlay.classList.remove('hidden');
            } else {
                overlay.classList.add('hidden');
                lastTime = performance.now();
                update();
            }
        }

        function update(time = 0) {
            if (!gameActive || isPaused) return;
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) playerDrop();
            draw();
            requestAnimationFrame(update);
        }

        function startGame() {
            if (isPaused) {
                togglePause();
                return;
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('ui-overlay').classList.add('hidden');
            arena.forEach(row => row.fill(0));
            player.score = 0;
            scoreElement.innerText = 0;
            gameActive = true;
            isPaused = false;
            resetPlayer();
            lastTime = performance.now();
            update();
        }

        document.addEventListener('keydown', event => {
            if (event.keyCode === 37) playerMove(-1);
            else if (event.keyCode === 39) playerMove(1);
            else if (event.keyCode === 40) playerDrop();
            else if (event.keyCode === 38) playerRotate(1);
            else if (event.keyCode === 80) togglePause(); // Tecla P para pausa
        });

    </script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then(reg => console.log('Service Worker registrado con éxito'))
        .catch(err => console.error('Error al registrar el Service Worker', err));
    });
  }
</script>
</body>
</html>
