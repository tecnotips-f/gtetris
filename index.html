<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>👑 Glory Tetris</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            background-color: #020617;
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            touch-action: none;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            padding-top: env(safe-area-inset-top);
        }

        #game-container {
            position: relative;
            margin-top: 5px;
            border: 4px solid #334155;
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(34, 211, 238, 0.3);
            background: rgba(15, 23, 42, 0.9);
            max-height: 70vh; 
        }

        canvas {
            display: block;
            background-color: #0f172a;
            border-radius: 4px;
            max-height: 65vh;
            width: auto;
        }

        .header-title {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(to bottom, #fde047, #ca8a04);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 10px rgba(202, 138, 4, 0.4);
            margin-top: 5px;
            letter-spacing: -1px;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .msg-box {
            background: rgba(15, 23, 42, 0.98);
            padding: 20px;
            border-radius: 20px;
            border: 2px solid #ca8a04;
            text-align: center;
            pointer-events: auto;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 50px rgba(0,0,0,0.9);
            width: 85%;
        }

        .btn {
            background: linear-gradient(135deg, #fde047 0%, #ca8a04 100%);
            color: #451a03;
            padding: 10px 30px;
            border-radius: 99px;
            font-weight: 900;
            cursor: pointer;
            margin-top: 15px;
            border: none;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(202, 138, 4, 0.2);
        }

        .stats-box {
            background: rgba(30, 41, 59, 0.5);
            padding: 5px 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <h1 class="header-title">👑 Glory</h1>

    <div class="flex gap-4 mb-2 mt-1">
        <div class="text-center stats-box">
            <p class="text-[9px] text-slate-400 uppercase font-black tracking-widest">Puntos</p>
            <p id="score" class="text-lg font-black text-yellow-500">0</p>
        </div>
        <div class="text-center stats-box">
            <p class="text-[9px] text-slate-400 uppercase font-black tracking-widest">Nivel</p>
            <p id="level" class="text-lg font-black text-cyan-400">1</p>
        </div>
    </div>

    <div id="game-container">
        <canvas id="tetris"></canvas>
        <div id="ui-layer">
            <div id="start-msg" class="msg-box">
                <h2 class="text-xl font-black mb-1 text-white uppercase italic">9 Columnas</h2>
                <div class="space-y-1 text-slate-300 text-[10px] font-bold">
                    <p>MÓVIL: Tap gira / Swipe mueve</p>
                    <p>PC: Clic gira / Flechas mueven</p>
                </div>
                <button class="btn" onclick="initAudioAndStart()">Empezar</button>
            </div>
            <div id="game-over-msg" class="msg-box hidden">
                <h2 class="text-2xl font-black mb-1 text-red-500">FINAL</h2>
                <p id="final-score" class="text-white text-lg font-bold mb-3">Puntos: 0</p>
                <button class="btn" onclick="resetGame()">Reiniciar</button>
            </div>
        </div>
    </div>

    <!-- Espacio inferior de seguridad -->
    <div class="h-24 md:h-8"></div>

    <script>
        // --- SISTEMA DE AUDIO SINTÉTICO ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playTone(freq, type, duration, volume = 0.1) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(volume, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const sounds = {
            move: () => playTone(150, 'square', 0.05, 0.05),
            rotate: () => playTone(300, 'sine', 0.1, 0.05),
            drop: () => playTone(100, 'triangle', 0.1, 0.1),
            line: () => {
                playTone(440, 'square', 0.4, 0.1);
                setTimeout(() => playTone(554.37, 'square', 0.4, 0.1), 50);
                setTimeout(() => playTone(659.25, 'square', 0.4, 0.1), 100);
                setTimeout(() => playTone(880, 'square', 0.5, 0.1), 150);
            },
            gameOver: () => {
                playTone(150, 'sawtooth', 0.5, 0.1);
                setTimeout(() => playTone(100, 'sawtooth', 0.8, 0.1), 200);
            }
        };

        function initAudioAndStart() {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            resetGame();
        }

        // --- LÓGICA DEL MOTOR ---
        const canvas = document.getElementById('tetris');
        const context = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const levelElement = document.getElementById('level');

        const COLS = 9;
        const ROWS = 16;
        const BLOCK_SIZE = 30;

        canvas.width = COLS * BLOCK_SIZE;
        canvas.height = ROWS * BLOCK_SIZE;
        context.scale(BLOCK_SIZE, BLOCK_SIZE);

        function createPiece(type) {
            if (type === 'I') return [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]];
            if (type === 'L') return [[0, 2, 0], [0, 2, 0], [0, 2, 2]];
            if (type === 'J') return [[0, 3, 0], [0, 3, 0], [3, 3, 0]];
            if (type === 'O') return [[4, 4], [4, 4]];
            if (type === 'Z') return [[5, 5, 0], [0, 5, 5], [0, 0, 0]];
            if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
            if (type === 'T') return [[0, 7, 0], [7, 7, 7], [0, 0, 0]];
        }

        const colors = [null, '#06b6d4', '#f97316', '#6366f1', '#eab308', '#ef4444', '#22c55e', '#a855f7'];

        function createMatrix(w, h) {
            const matrix = [];
            while (h--) matrix.push(new Array(w).fill(0));
            return matrix;
        }

        // FIX: Agregada validación para evitar error 'Cannot read properties of null (reading forEach)'
        function drawMatrix(matrix, offset) {
            if (!matrix) return; 
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        context.fillStyle = colors[value];
                        context.fillRect(x + offset.x, y + offset.y, 1, 1);
                        context.strokeStyle = 'rgba(255,255,255,0.3)';
                        context.lineWidth = 0.05;
                        context.strokeRect(x + offset.x + 0.1, y + offset.y + 0.1, 0.8, 0.8);
                        context.strokeStyle = '#020617';
                        context.lineWidth = 0.02;
                        context.strokeRect(x + offset.x, y + offset.y, 1, 1);
                    }
                });
            });
        }

        function draw() {
            context.fillStyle = '#0f172a';
            context.fillRect(0, 0, canvas.width, canvas.height);

            context.strokeStyle = 'rgba(255,255,255,0.05)';
            context.lineWidth = 0.02;
            for(let i=0; i<=COLS; i++) {
                context.beginPath(); context.moveTo(i, 0); context.lineTo(i, ROWS); context.stroke();
            }
            for(let i=0; i<=ROWS; i++) {
                context.beginPath(); context.moveTo(0, i); context.lineTo(COLS, i); context.stroke();
            }

            drawMatrix(arena, {x: 0, y: 0});
            drawMatrix(player.matrix, player.pos);
        }

        function merge(arena, player) {
            player.matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
                });
            });
        }

        function rotate(matrix, dir) {
            for (let y = 0; y < matrix.length; ++y) {
                for (let x = 0; x < y; ++x) {
                    [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
                }
            }
            dir > 0 ? matrix.forEach(row => row.reverse()) : matrix.reverse();
        }

        function collide(arena, player) {
            const [m, o] = [player.matrix, player.pos];
            for (let y = 0; y < m.length; ++y) {
                for (let x = 0; x < m[y].length; ++x) {
                    if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
                }
            }
            return false;
        }

        function arenaSweep() {
            let linesCleared = 0;
            outer: for (let y = arena.length - 1; y > 0; --y) {
                for (let x = 0; x < arena[y].length; ++x) {
                    if (arena[y][x] === 0) continue outer;
                }
                const row = arena.splice(y, 1)[0].fill(0);
                arena.unshift(row);
                ++y;
                linesCleared++;
            }
            
            if (linesCleared > 0) {
                player.score += (linesCleared * 10) * linesCleared;
                sounds.line();
                updateScore();
            }
        }

        function playerDrop() {
            if (!player.matrix) return;
            player.pos.y++;
            if (collide(arena, player)) {
                player.pos.y--;
                merge(arena, player);
                sounds.drop();
                playerReset();
                arenaSweep();
                updateScore();
            }
            dropCounter = 0;
        }

        function playerMove(dir) {
            if (!player.matrix) return;
            player.pos.x += dir;
            if (collide(arena, player)) {
                player.pos.x -= dir;
            } else {
                sounds.move();
            }
        }

        function playerRotate(dir) {
            if (!player.matrix) return;
            const pos = player.pos.x;
            let offset = 1;
            rotate(player.matrix, dir);
            while (collide(arena, player)) {
                player.pos.x += offset;
                offset = -(offset + (offset > 0 ? 1 : -1));
                if (offset > player.matrix[0].length) {
                    rotate(player.matrix, -dir);
                    player.pos.x = pos;
                    return;
                }
            }
            sounds.rotate();
        }

        function playerReset() {
            const pieces = 'ILJOTSZ';
            player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
            player.pos.y = 0;
            player.pos.x = (arena[0].length / 2 | 0) - (player.matrix[0].length / 2 | 0);
            if (collide(arena, player)) gameOver();
        }

        function updateScore() {
            scoreElement.innerText = player.score;
            const lvl = Math.floor(player.score / 150) + 1;
            levelElement.innerText = lvl;
            dropInterval = Math.max(80, 800 - (lvl - 1) * 120);
        }

        function gameOver() {
            isGameOver = true;
            sounds.gameOver();
            document.getElementById('final-score').innerText = `Puntos: ${player.score}`;
            document.getElementById('game-over-msg').classList.remove('hidden');
        }

        function resetGame() {
            arena.forEach(row => row.fill(0));
            player.score = 0;
            isGameOver = false;
            document.getElementById('start-msg').classList.add('hidden');
            document.getElementById('game-over-msg').classList.add('hidden');
            playerReset();
            updateScore();
            update();
        }

        let dropCounter = 0;
        let dropInterval = 800;
        let lastTime = 0;
        let isGameOver = true;

        function update(time = 0) {
            if (isGameOver) return;
            const deltaTime = time - lastTime;
            lastTime = time;
            dropCounter += deltaTime;
            if (dropCounter > dropInterval) playerDrop();
            draw();
            requestAnimationFrame(update);
        }

        const arena = createMatrix(COLS, ROWS);
        const player = { pos: {x: 0, y: 0}, matrix: null, score: 0 };

        document.addEventListener('keydown', e => {
            if (isGameOver) return;
            if (e.keyCode === 37) playerMove(-1);
            if (e.keyCode === 39) playerMove(1);
            if (e.keyCode === 40) playerDrop();
            if (e.keyCode === 38) playerRotate(1);
        });

        canvas.addEventListener('mousedown', () => {
            if (!isGameOver) playerRotate(1);
        });

        let touchStartX = 0;
        let touchStartY = 0;
        canvas.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, {passive: false});

        canvas.addEventListener('touchmove', e => {
            if (isGameOver) return;
            e.preventDefault();
            const dx = e.touches[0].clientX - touchStartX;
            const dy = e.touches[0].clientY - touchStartY;

            if (Math.abs(dx) > 20) {
                playerMove(dx > 0 ? 1 : -1);
                touchStartX = e.touches[0].clientX;
            }
            if (dy > 35) {
                playerDrop();
                touchStartY = e.touches[0].clientY;
            }
        }, {passive: false});

        draw();
    </script>
</body>
</html>
